name: Build and Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: Draft release
        type: boolean
        required: false
        default: false
      prerelease:
        description: Prerelease
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - id: ver
        shell: bash
        run: |
          VERSION="$(python -c "from backend.app.version import __version__; print(__version__)")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win64
          - os: macos-13
            platform: mac-x64
          - os: macos-14
            platform: mac-arm64
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install --index-url https://download.pytorch.org/whl/cpu --upgrade --force-reinstall torch torchvision
          pip install pyinstaller

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install --index-url https://download.pytorch.org/whl/cpu --upgrade --force-reinstall torch torchvision
          pip install pyinstaller

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean packaging/pyinstaller/DeepMatrix.spec

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pyinstaller --noconfirm --clean packaging/pyinstaller/DeepMatrix-mac.spec

      - name: Create installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y
          $outName = "DeepMatrix-$env:VERSION-Setup.exe"
          makensis /DAPP_VERSION=$env:VERSION /DSOURCE_DIR=dist\\DeepMatrix /DOUTPUT_NAME=$outName installer\\windows\\DeepMatrix.nsi
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Move-Item $outName artifacts\\DeepMatrix-$env:VERSION-$env:RUNNER_OS-${{ matrix.platform }}.exe

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          chmod +x scripts/make_dmg.sh
          out="DeepMatrix-${VERSION}-${{ matrix.platform }}.dmg"
          ./scripts/make_dmg.sh "dist/DeepMatrix.app" "$out" "DeepMatrix ${VERSION}"
          mkdir -p artifacts
          mv "$out" "artifacts/$out"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: artifacts/*

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      DRAFT: ${{ inputs.draft }}
      PRERELEASE: ${{ inputs.prerelease }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        shell: bash
        run: ls -R artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          draft: ${{ env.DRAFT }}
          prerelease: ${{ env.PRERELEASE }}
          files: |
            artifacts/**/*
