name: Build and Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: Draft release
        type: boolean
        required: false
        default: false
      prerelease:
        description: Prerelease
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  WORKFLOW_REV: "2026-02-05-windows-nsis-fix"

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - id: ver
        shell: bash
        run: |
          VERSION="$(python -c "from backend.app.version import __version__; print(__version__)")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win64
          - os: macos-15
            platform: mac-x64
          - os: macos-14
            platform: mac-arm64
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install --index-url https://download.pytorch.org/whl/cpu --upgrade --force-reinstall torch torchvision
          pip install pyinstaller

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install --index-url https://download.pytorch.org/whl/cpu --upgrade --force-reinstall torch torchvision
          pip install pyinstaller

      - name: Generate icons (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python scripts/generate_icons.py

      - name: Generate icons (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python scripts/generate_icons.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --distpath dist --workpath build packaging/pyinstaller/DeepMatrix.spec

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --distpath dist --workpath build packaging/pyinstaller/DeepMatrix-mac.spec

      - name: Prepare signing keychain (macOS)
        if: runner.os == 'macOS' && env.MACOS_CERT_BASE64 != '' && env.MACOS_CERT_PASSWORD != '' && env.MACOS_KEYCHAIN_PASSWORD != '' && env.MACOS_CODESIGN_IDENTITY != ''
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$MACOS_CERT_BASE64" | base64 -D > "$CERT_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Codesign app (macOS)
        if: runner.os == 'macOS' && env.MACOS_CODESIGN_IDENTITY != '' && env.MACOS_CERT_BASE64 != '' && env.MACOS_CERT_PASSWORD != '' && env.MACOS_KEYCHAIN_PASSWORD != ''
        shell: bash
        env:
          CODESIGN_IDENTITY: ${{ env.MACOS_CODESIGN_IDENTITY }}
        run: |
          APP_PATH="dist/DeepMatrix.app"
          ENTITLEMENTS="packaging/macos/entitlements.plist"
          codesign --force --deep --options runtime --timestamp --entitlements "$ENTITLEMENTS" -s "$CODESIGN_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute --verbose=2 "$APP_PATH" || true

      - name: Create installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "GITHUB_SHA=$env:GITHUB_SHA"
          Write-Host "VERSION=$env:VERSION"
          Write-Host "WORKFLOW_REV=$env:WORKFLOW_REV"
          choco install nsis -y
          if ($env:ChocolateyInstall -and (Test-Path "$env:ChocolateyInstall\\helpers\\chocolateyProfile.psm1")) {
            Import-Module "$env:ChocolateyInstall\\helpers\\chocolateyProfile.psm1"
            refreshenv | Out-Null
          }

          $pf = $env:ProgramFiles
          $pf86 = ${env:ProgramFiles(x86)}

          $nsisDirs = @(
            "C:\\Program Files (x86)\\NSIS",
            "C:\\Program Files\\NSIS",
            "C:\\ProgramData\\chocolatey\\lib\\nsis.install\\tools"
          ) | Where-Object { $_ -and (Test-Path $_) }

          foreach ($d in $nsisDirs) {
            Write-Host "NSIS dir: $d"
            Get-ChildItem -Path $d -Force -ErrorAction SilentlyContinue | Select-Object -First 50 | ForEach-Object { Write-Host (" - " + $_.FullName) }
          }

          $outName = "DeepMatrix-$env:VERSION-Setup.exe"
          $makensisCandidates = @()
          if ($pf86) { $makensisCandidates += "$pf86\\NSIS\\Bin\\makensis.exe" }
          if ($pf86) { $makensisCandidates += "$pf86\\NSIS\\makensis.exe" }
          if ($pf) { $makensisCandidates += "$pf\\NSIS\\Bin\\makensis.exe" }
          if ($pf) { $makensisCandidates += "$pf\\NSIS\\makensis.exe" }
          $makensisCandidates += "$env:ChocolateyInstall\\bin\\makensis.exe"
          $makensisCandidates += "C:\\ProgramData\\chocolatey\\bin\\makensis.exe"
          $makensisCandidates += "C:\\ProgramData\\chocolatey\\lib\\nsis.install\\tools\\makensis.exe"
          $makensisCandidates += "C:\\ProgramData\\chocolatey\\lib\\nsis\\tools\\makensis.exe"

          $makensisPath = $makensisCandidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1

          if (-not $makensisPath) {
            $cmd = Get-Command makensis.exe -ErrorAction SilentlyContinue
            if ($cmd) { $makensisPath = $cmd.Source }
          }

          if (-not $makensisPath) {
            $roots = @()
            if ($pf) { $roots += $pf }
            if ($pf86) { $roots += $pf86 }
            $roots += "C:\\Program Files (x86)"
            $roots += "C:\\Program Files"
            $roots = $roots | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique
            foreach ($r in $roots) {
              $hits = Get-ChildItem -Path $r -Filter makensis.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($hits) { $makensisPath = $hits.FullName; break }
            }
          }

          if (-not $makensisPath) {
            Write-Host "where.exe makensis.exe:"
            where.exe makensis.exe | Write-Host
            throw "makensis.exe not found after installing NSIS"
          }
          Write-Host "Using makensis: $makensisPath"
          & $makensisPath /DAPP_VERSION=$env:VERSION /DSOURCE_DIR=dist\\DeepMatrix /DOUTPUT_NAME=$outName installer\\windows\\DeepMatrix.nsi
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Move-Item $outName artifacts\\DeepMatrix-$env:VERSION-$env:RUNNER_OS-${{ matrix.platform }}.exe

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          chmod +x scripts/make_dmg.sh
          out="DeepMatrix-${VERSION}-${{ matrix.platform }}.dmg"
          ./scripts/make_dmg.sh "dist/DeepMatrix.app" "$out" "DeepMatrix ${VERSION}"
          echo "DMG_OUT=$out" >> "$GITHUB_ENV"

      - name: Notarize and staple DMG (macOS)
        if: runner.os == 'macOS' && env.APPLE_NOTARY_KEY_BASE64 != '' && env.APPLE_NOTARY_KEY_ID != '' && env.APPLE_NOTARY_ISSUER_ID != ''
        shell: bash
        run: |
          KEY_PATH="$RUNNER_TEMP/notary-key.p8"
          echo "$APPLE_NOTARY_KEY_BASE64" | base64 -D > "$KEY_PATH"
          xcrun notarytool submit "$DMG_OUT" --key "$KEY_PATH" --key-id "$APPLE_NOTARY_KEY_ID" --issuer "$APPLE_NOTARY_ISSUER_ID" --wait
          xcrun stapler staple "$DMG_OUT"
          xcrun stapler validate "$DMG_OUT"

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p artifacts
          mv "$DMG_OUT" "artifacts/$DMG_OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: artifacts/*

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.meta.outputs.version }}
      DRAFT: ${{ inputs.draft }}
      PRERELEASE: ${{ inputs.prerelease }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        shell: bash
        run: ls -R artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          draft: ${{ env.DRAFT }}
          prerelease: ${{ env.PRERELEASE }}
          files: |
            artifacts/**/*
